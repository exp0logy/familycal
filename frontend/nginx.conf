# nginx.conf — serves the Vite SPA build and reverse-proxies /api + /ws
# to the backend container (service name: backend, port 8000).
#
# This config is embedded in the frontend Docker image (task #9).
# On a LAN-only deployment all traffic is trusted; no TLS termination here
# (deploy behind a local reverse proxy / router if TLS is desired).

server {
    listen 80;
    server_name _;

    # ── Static assets with aggressive caching ────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Vite content-hashed chunks — cache permanently
    location ~* \.(js|css|woff2?|ttf|svg|ico|png|webp)$ {
        expires max;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy → backend ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── WebSocket proxy → backend ─────────────────────────────────────────
    location /ws {
        proxy_pass          http://backend:8000/ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  86400s;  # keep WS alive
        proxy_send_timeout  86400s;
    }

    # ── Cached photos proxy → backend ─────────────────────────────────────
    # The slideshow plugin serves locally-cached originals from the backend at
    # /photos/<file> (mounted via StaticFiles in main.py). The `^~` modifier
    # makes this prefix win over the static-asset regex above, so photo files
    # of ANY extension (.jpg/.jpeg/.png/…) are proxied to the backend rather
    # than being looked up in the SPA's static root (which would 404).
    location ^~ /photos/ {
        proxy_pass         http://backend:8000/photos/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # Cache served photos in the browser briefly; the list refreshes via WS.
        expires 1h;
        add_header Cache-Control "public";
    }

    # ── SPA catch-all — return index.html for all other routes ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"     always;
    add_header X-Content-Type-Options   "nosniff"        always;
    add_header Referrer-Policy          "same-origin"    always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;
    gzip_min_length 1024;
    gzip_vary       on;
}
