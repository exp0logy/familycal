# nginx.conf — serves the Vite SPA build over HTTPS and reverse-proxies
# /api, /ws, /photos to the backend container (service name: backend, port 8000).
#
# HTTPS is required so Google OAuth accepts the redirect URI (it rejects private
# IPs and bare http for non-localhost), and so the Screen Wake Lock API works.
# A self-signed cert is auto-generated at container start by
# /docker-entrypoint.d/40-gen-tls-cert.sh (CN from $TLS_HOSTNAME). Mount a real
# cert at /etc/nginx/certs/{cert,key}.pem to override.

# Redirect all plain HTTP to HTTPS (use the hostname, not the IP, to match the cert).
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:2m;
    ssl_session_timeout 1h;

    root /usr/share/nginx/html;
    index index.html;

    # Vite content-hashed chunks — cache permanently
    location ~* \.(js|css|woff2?|ttf|svg|ico|png|webp)$ {
        expires max;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy → backend ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── WebSocket proxy → backend (wss) ───────────────────────────────────
    location /ws {
        proxy_pass          http://backend:8000/ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  86400s;  # keep WS alive
        proxy_send_timeout  86400s;
    }

    # ── Cached photos proxy → backend ─────────────────────────────────────
    # `^~` beats the static-asset regex so photos of ANY extension proxy through.
    location ^~ /photos/ {
        proxy_pass         http://backend:8000/photos/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        expires 1h;
        add_header Cache-Control "public";
    }

    # ── SPA catch-all ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"     always;
    add_header X-Content-Type-Options   "nosniff"        always;
    add_header Referrer-Policy          "same-origin"    always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;
    gzip_min_length 1024;
    gzip_vary       on;
}
